<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG 视频流媒体控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://npm.elemecdn.com/lxgw-wenkai-webfont@1.1.0/lxgwwenkai-regular.css" />
    
    <style>
        body {
            font-family: 'LXGW WenKai', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen antialiased selection:bg-blue-500/30">

    <div class="max-w-5xl mx-auto px-4 py-8 md:py-12 space-y-8">
        
        <header class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-800 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400">
                    TELESTREAM PAGES
                </h1>
                <p class="text-slate-400 text-xs mt-1.5 flex items-center gap-2">
                    <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    基于 Cloudflare Pages & Telegram Distributed Engine 强力驱动
                </p>
            </div>
            <div class="flex gap-3 text-xs text-slate-400">
                <div class="bg-slate-900/60 border border-slate-800 px-3 py-2 rounded-lg">块大小: <span class="text-blue-400 font-bold">10 MB</span></div>
                <div class="bg-slate-900/60 border border-slate-800 px-3 py-2 rounded-lg">缓冲引擎: <span class="text-emerald-400 font-bold">HTTP Range</span></div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <main class="lg:col-span-2 space-y-6">
                <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800/80 rounded-2xl overflow-hidden shadow-2xl group transition-all duration-300 hover:border-slate-700/50">
                    <div class="p-4 bg-slate-900/80 border-b border-slate-800/60 flex items-center justify-between">
                        <span class="text-sm font-semibold text-slate-200 flex items-center gap-2">
                            <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span id="currentVideoTitle">暂无播放任务</span>
                        </span>
                        <span class="text-xs px-2 py-0.5 bg-blue-500/10 text-blue-400 rounded-full border border-blue-500/20">内置沙盒引擎</span>
                    </div>
                    
                    <div class="aspect-video bg-black flex items-center justify-center relative">
                        <iframe id="videoIframe" src="about:blank" class="w-full h-full border-0 hidden" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        
                        <div id="playerPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/90 z-10 transition-all duration-500">
                            <div class="w-16 h-16 rounded-full bg-blue-500/10 flex items-center justify-center border border-blue-500/20 mb-3 text-blue-400 group-hover:scale-110 transition-transform">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h18M3 16h18"></path></svg>
                            </div>
                            <span class="text-sm text-slate-400">请在下方检索或在右侧上传视频</span>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800/80 p-5 rounded-2xl shadow-xl space-y-4">
                    <h3 class="text-sm font-bold text-slate-300 flex items-center gap-2">
                        <span class="w-1 h-3.5 bg-blue-500 rounded-full"></span> 载入已有流媒体直链
                    </h3>
                    <div class="flex gap-2">
                        <input type="text" id="fileUidInput" placeholder="输入文件 UID (如 vid_xxxxxx)" class="flex-1 bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-all placeholder:text-slate-600" />
                        <button onclick="loadVideo()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white px-6 py-3 text-sm font-bold rounded-xl transition duration-200 shadow-lg shadow-blue-600/20">
                            核心渲染
                        </button>
                    </div>
                    
                    <div class="hidden space-y-2 animate-fadeIn" id="linkContainer">
                        <label class="text-xs text-slate-500 block">第三方播放器直链 (支持 PotPlayer / IJKPlayer / VLC / Iframe嵌入):</label>
                        <div class="flex items-center gap-3 bg-slate-950/80 p-3 rounded-xl border border-slate-800">
                            <a id="directLink" href="#" target="_blank" class="text-xs text-cyan-400 break-all underline flex-1 hover:text-cyan-300"></a>
                            <button onclick="navigator.clipboard.writeText(document.getElementById('directLink').innerText); alert('直链已成功复制至剪贴板！')" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-700 transition">复制</button>
                        </div>
                    </div>
                </div>
            </main>

            <aside class="space-y-6">
                <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800/80 p-6 rounded-2xl shadow-xl space-y-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 class="text-lg font-bold text-slate-200">极速分片上传</h2>
                            <p class="text-xs text-slate-500 mt-1">智能多线程算法，杜绝中途丢包</p>
                        </div>
                        <button onclick="exportUidLog()" title="导出云端全量 JSON 账本" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-2.5 py-1.5 border border-slate-700 rounded-lg flex items-center gap-1 transition active:scale-95">
                            <svg class="w-3.5 h-3.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            导出 JSON
                        </button>
                    </div>

                    <div class="relative group border-2 border-dashed border-slate-800 hover:border-blue-500/50 rounded-xl p-6 transition-all bg-slate-950/20 text-center cursor-pointer">
                        <input type="file" id="videoInput" accept="video/*" class="absolute inset-0 opacity-0 cursor-pointer z-10" />
                        <div class="space-y-2">
                            <div class="mx-auto w-12 h-12 text-slate-600 group-hover:text-blue-400 transition-colors">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 16v-8m0 8l-4-4m4 4l4-4m5 4v3a2 2 0 01-2 2H7a2 2 0 01-2-2v-3a2 2 0 012-2h10a2 2 0 012 2z"></path></svg>
                            </div>
                            <p class="text-xs text-slate-400 font-medium group-hover:text-slate-200 transition-colors">点击或将视频 file 拖拽至此处</p>
                            <p class="text-[10px] text-slate-600">支持 MP4, MKV, MOV 等大视频格式</p>
                        </div>
                    </div>

                    <button id="uploadBtn" onclick="startUpload()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 active:scale-[0.98] text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-lg shadow-emerald-900/30">
                        建立切片安全上行
                    </button>
                    
                    <div id="progressContainer" class="hidden space-y-3 bg-slate-950/50 p-4 rounded-xl border border-slate-800/60 animate-pulse">
                        <div class="flex justify-between text-xs font-medium">
                            <span class="text-slate-400" id="progressStatus">等待指令...</span>
                            <span class="text-blue-400" id="progressPercent">0%</span>
                        </div>
                        <div class="w-full bg-slate-900 rounded-full h-2 overflow-hidden border border-slate-800">
                            <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full w-0 transition-all duration-300 ease-out"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const CHUNK_SIZE = 10 * 1024 * 1024; // 严格限制 10MB 分片

        // 🌟 智能加载并嵌入直链播放器逻辑
        function loadVideo() {
            const uid = document.getElementById('fileUidInput').value.trim();
            if (!uid) return alert('请输入合规的分布式存储 UID。');

            // 1. 生成后端直链路由地址
            const streamUrl = window.location.origin + '/api/stream/' + uid;
            
            const placeholder = document.getElementById('playerPlaceholder');
            const videoIframe = document.getElementById('videoIframe');
            const linkContainer = document.getElementById('linkContainer');
            const directLink = document.getElementById('directLink');
            const titleSpan = document.getElementById('currentVideoTitle');

            // 2. 调度 DOM 显隐过渡
            placeholder.classList.add('opacity-0', 'pointer-events-none');
            videoIframe.classList.remove('hidden');
            
            // 3. 将 iframe 指向直链地址（后端会为其自动化吐出带 Plyr 渲染的纯净页面）
            videoIframe.src = streamUrl;

            // 4. 组装底部辅助快捷复制属性
            if (linkContainer) {
                linkContainer.classList.remove('hidden');
                directLink.href = streamUrl;
                directLink.innerText = streamUrl;
            }
            
            if (titleSpan.innerText === "暂无播放任务") {
                titleSpan.innerText = "正在通过独立沙盒流式解析: " + uid;
            }
        }

        // 🌟 革命性重构：前端收集型高并发上传算法
        async function startUpload() {
            const fileInput = document.getElementById('videoInput');
            if (!fileInput.files.length) return alert('核心拦截：请先置入本地视频资产！');

            const file = fileInput.files[0];
            // 随机生成唯一的分布式存储 UID
            const fileUid = 'vid_' + Math.random().toString(36).substring(2, 15);
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            
            const pContainer = document.getElementById('progressContainer');
            const pBar = document.getElementById('progressBar');
            const pStatus = document.getElementById('progressStatus');
            const pPercent = document.getElementById('progressPercent');
            
            pContainer.classList.remove('hidden');
            document.getElementById('uploadBtn').disabled = true;

            // 🌟 核心改进：在前端建立一个容器，专门用来严格按顺序存放每个分片换回来的 fileId
            const finalChunksLedger = new Array(totalChunks).fill(null);
            const chunksQueue = Array.from({length: totalChunks}, (_, i) => i);
            const CONCURRENCY = 5; // 保持 5 线程稳定并发

            async function uploadWorker() {
                while (chunksQueue.length > 0) {
                    const chunkIndex = chunksQueue.shift(); 
                    if (chunkIndex === undefined) break;

                    const start = chunkIndex * CHUNK_SIZE;
                    const end = Math.min(start + CHUNK_SIZE, file.size);
                    const chunk = file.slice(start, end);

                    const formData = new FormData();
                    formData.append('chunk', chunk);
                    formData.append('fileName', `${file.name}.part${chunkIndex}`);

                    let success = false;
                    let retries = 5; 

                    while (!success && retries > 0) {
                        try {
                            // 请求中转路由，不消耗 KV 额度
                            const response = await fetch('/api/upload', { method: 'POST', body: formData });
                            if (!response.ok) throw new Error('网络吞吐故障');
                            
                            const resData = await response.json();
                            if (resData.success && resData.fileId) {
                                success = true;
                                
                                // 🌟 极其重要：将 Telegram 返回的 fileId 写入对应的槽位中，保证文件顺序绝不错乱
                                finalChunksLedger[chunkIndex] = resData.fileId; 
                                
                                // 刷新前端进度条记账
                                const completedCount = finalChunksLedger.filter(Boolean).length;
                                const percent = Math.round((completedCount / totalChunks) * 100);
                                
                                pStatus.innerText = `分片传输中: ${completedCount} / ${totalChunks} 块`;
                                pPercent.innerText = `${percent}%`;
                                pBar.style.width = percent + '%';
                            } else {
                                throw new Error(resData.error || '业务中断');
                            }
                        } catch (err) {
                            retries--;
                            await new Promise(res => setTimeout(res, (5 - retries) * 2000)); // 指数退避重试
                        }
                    }

                    // 如果连续重试 5 次都彻底失败，重新掷回队列尾部
                    if (!success) {
                        chunksQueue.push(chunkIndex);
                        await new Promise(res => setTimeout(res, 5000));
                    }
                }
            }

            // 启动线程池并发上行
            const workers = Array.from({length: Math.min(CONCURRENCY, totalChunks)}, () => uploadWorker());
            await Promise.all(workers);

            // 环比扫描：确保前端手里的 fileId 没有任何一个漏掉的
            const isAllUploaded = finalChunksLedger.every(id => id !== null);

            if (isAllUploaded) {
                pStatus.innerText = `分片收拢完毕，正在向云端申请结算...`;
                
                try {
                    // 🌟 终极收尾：向后端 /api/save 发送总账，进行唯一一次 KV 写入
                    const saveResponse = await fetch('/api/save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            uid: fileUid,
                            name: file.name,
                            size: file.size,
                            chunks: finalChunksLedger
                        })
                    });

                    const saveResult = await saveResponse.json();
                    if (saveResult.success) {
                        pStatus.innerHTML = `<span class="text-emerald-400 font-bold">🎉 100% 结算入库成功!</span>`;
                        pPercent.innerText = '100%';
                        document.getElementById('fileUidInput').value = fileUid;
                        document.getElementById('currentVideoTitle').innerText = file.name;
                    } else {
                        throw new Error(saveResult.error);
                    }
                } catch (saveErr) {
                    pStatus.innerHTML = `<span class="text-red-400 font-bold">❌ 云端结算失败: ${saveErr.message}</span>`;
                }
            } else {
                pStatus.innerHTML = `<span class="text-red-400 font-bold">❌ 部分文件分片在上行链路永久丢失</span>`;
            }
            document.getElementById('uploadBtn').disabled = false;
        }

        // 🌟 终极防错版：全自动跨卷全量导出，并智能修复老视频字段
        async function exportUidLog() {
            const exportBtn = document.querySelector('button[onclick="exportUidLog()"]');
            if (!exportBtn) return;
            const originalText = exportBtn.innerHTML;
            
            try {
                exportBtn.disabled = true;
                exportBtn.innerHTML = `<svg class="w-3.5 h-3.5 animate-spin inline mr-1" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 正在跨卷同步...`;

                // 1. 请求第一页列表，拿到无指针分卷总册数
                const firstRes = await fetch('/api/list?page=1');
                if (!firstRes.ok) throw new Error('读取云端索引失败');
                
                // 兼容处理：支持后端直接返回数组（老版方案一）或返回带分页的对象
                const firstResult = await firstRes.json();
                let allMergedVideos = [];
                let totalLedgers = 1;

                if (Array.isArray(firstResult)) {
                    // 说明后端使用的是【方案一：后端全自动合并版】
                    allMergedVideos = firstResult;
                } else {
                    // 说明后端使用的是【分卷带 page 属性版】
                    allMergedVideos = firstResult.data || [];
                    totalLedgers = firstResult.totalPages || 1;

                    // 🚀 如果总册数大于 1，并发轮询把剩下几册全部抽干
                    if (totalLedgers > 1) {
                        const fetchPromises = [];
                        for (let p = 2; p <= totalLedgers; p++) {
                            fetchPromises.push(fetch(`/api/list?page=${p}`).then(res => res.json()));
                        }
                        const remainingPages = await Promise.all(fetchPromises);
                        remainingPages.forEach(pageResult => {
                            if (pageResult.data) {
                                allMergedVideos = allMergedVideos.concat(pageResult.data);
                            }
                        });
                    }
                }

                if (allMergedVideos.length === 0) {
                    alert("云端账本空空如也，没有发现可导出的资产！");
                    return;
                }

                // 2. 🌟 智能清洗与标准化数据（核心防错修改点）
                const processedData = allMergedVideos.map((item, index) => {
                    // 🚨 【双重保险】如果老数据连总账本里都没塞进 uid，则尝试从外部其他可能的地方兜底，或者直接标记异常，防止抛错卡死
                    const safeUid = item.uid || item.id || `unknown_vid_${index}`;
                    
                    return {
                        uid: safeUid,
                        name: item.name || '未命名视频或历史资产',
                        size_bytes: item.size || 0,
                        size_mb: item.size ? parseFloat((item.size / 1024 / 1024).toFixed(2)) : 0,
                        // 拼接标准的流媒体在线播放地址与原始串流地址
                        stream_url: `${window.location.origin}/api/stream/${safeUid}`,
                        raw_stream_url: `${window.location.origin}/api/stream/${safeUid}?stream=true`,
                        uploaded_at: item.time || new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })
                    };
                });

                // 3. 转化为标准的 JSON 文本文件并触发浏览器下载
                const blob = new Blob([JSON.stringify(processedData, null, 4)], { type: "application/json;charset=utf-8" });
                const downloadUrl = URL.createObjectURL(blob);
                const aLink = document.createElement("a");
                const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, "");
                
                aLink.href = downloadUrl;
                aLink.download = `TG_Storage_Backup_${dateStr}.json`;
                document.body.appendChild(aLink);
                aLink.click();
                
                // 清理现场
                document.body.removeChild(aLink);
                URL.revokeObjectURL(downloadUrl);

            } catch (err) {
                alert(`资产备份失败: ${err.message}`);
            } finally {
                exportBtn.disabled = false;
                exportBtn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
